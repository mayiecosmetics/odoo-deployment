# =============================================================================
# Nginx Reverse Proxy — Odoo + MinIO (Mayie Cosmetics)
# =============================================================================
# Place this in /etc/nginx/sites-available/ and symlink to sites-enabled/:
#   ln -s /etc/nginx/sites-available/odoo.conf /etc/nginx/sites-enabled/
#
# Replace all occurrences of:
#   your-domain.com        → your Odoo domain (e.g. erp.mayie.ro)
#   minio.your-domain.com  → your MinIO console subdomain (e.g. minio.mayie.ro)
# =============================================================================

upstream odoo {
    server 127.0.0.1:8069;
}

upstream odoo-chat {
    server 127.0.0.1:8072;
}

upstream minio-console {
    server 127.0.0.1:9001;
}

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect (Odoo)
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect (MinIO console)
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name minio.your-domain.com;
    return 301 https://$host$request_uri;
}

# ---------------------------------------------------------------------------
# Odoo HTTPS
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # --- SSL (Let's Encrypt) ---
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- Proxy headers ---
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- Timeouts ---
    proxy_read_timeout    720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout    720s;

    # --- Request size (portal/file uploads) ---
    client_max_body_size 200m;

    # --- Odoo web ---
    location / {
        proxy_pass     http://odoo;
        proxy_redirect off;
    }

    # --- Odoo longpolling (gevent / live chat) ---
    location /longpolling {
        proxy_pass http://odoo-chat;
    }

    # --- Static files caching ---
    location ~* /web/static/ {
        proxy_pass        http://odoo;
        proxy_cache_valid 200 60m;
        expires           24h;
        add_header        Cache-Control "public, immutable";
    }

    # --- Gzip ---
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}

# ---------------------------------------------------------------------------
# MinIO Console HTTPS  (admin UI — restrict by IP if desired)
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name minio.your-domain.com;

    # --- SSL (Let's Encrypt) ---
    ssl_certificate     /etc/letsencrypt/live/minio.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/minio.your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # --- Restrict to your office/VPN IP (recommended) ---
    # allow 1.2.3.4;
    # deny all;

    # --- Proxy headers ---
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # MinIO console needs WebSocket support
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";

    client_max_body_size 0;
    proxy_buffering      off;

    location / {
        proxy_pass http://minio-console;
    }
}
