[options]
; =============================================================================
; Odoo Server Configuration — Mayie Cosmetics
; =============================================================================
; db_password and admin_passwd are injected via environment variables
; in docker-compose.yml. Do NOT hardcode secrets here.
; =============================================================================

; --- Addons ---
addons_path =
    /mnt/extra-addons/custom,
    /mnt/extra-addons/third_party,
    /usr/lib/python3/dist-packages/odoo/addons

; --- Database ---
db_host = db
db_port = 5432
db_user = False
db_password = False

; --- Admin ---
admin_passwd = False

; --- Data ---
data_dir = /var/lib/odoo

; --- Server ---
http_port = 8069
longpolling_port = 8072
proxy_mode = False

; --- Logging ---
; Logs go to stdout (Docker captures them). No logfile.
log_level = info

; --- Performance ---
; workers = 0 runs Odoo in single-process mode (safe for development).
; For production behind a reverse proxy, increase workers and set proxy_mode = True.
workers = 0
max_cron_threads = 1
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200

; --- Security ---
list_db = True
