[options]
; =============================================================================
; Odoo Server Configuration — Mayie Cosmetics
; =============================================================================

; --- Addons ---
addons_path =
    /mnt/extra-addons/custom,
    /mnt/extra-addons/third_party,
    /usr/lib/python3/dist-packages/odoo/addons

; --- Database ---
db_host = db
db_port = 5432
db_user = odoo
db_password = False
; admin_passwd = SET_VIA_ENV_OR_CHANGE_HERE

; --- Server ---
http_port = 8069
longpolling_port = 8072
proxy_mode = True

; --- Logging ---
log_level = info
logfile = /var/log/odoo/odoo.log

; --- Performance ---
workers = 4
max_cron_threads = 2
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200

; --- Security ---
list_db = False
