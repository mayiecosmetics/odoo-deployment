# =============================================================================
# Local development overrides
# =============================================================================
# This file is automatically picked up by Docker Compose alongside
# docker-compose.yml. Use it for local development settings that should
# NOT be deployed to production.
# =============================================================================

services:
  odoo:
    # Render config from template, then start Odoo in dev mode
    command: >
      sh -c "
        envsubst < /etc/odoo/odoo.conf.template > /tmp/odoo.conf &&
        exec odoo -c /tmp/odoo.conf --dev=reload,qweb,xml
      "
